x-logging: &default-logging
  driver: json-file
  options:
    max-size: 10m
    max-file: "3"

services:
  mysql:
    image: mysql:8.4
    container_name: lycan-mysql
    restart: unless-stopped
    command:
      - --mysql-native-password=ON
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${WALINE_DB_NAME}
      MYSQL_USER: ${WALINE_DB_USER}
      MYSQL_PASSWORD: ${WALINE_DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ../dev-services/waline/schema.sql:/docker-entrypoint-initdb.d/10-waline.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
    logging: *default-logging
    networks:
      - lycan_net

  waline:
    image: lizheming/waline:1.41.1-alpine
    container_name: lycan-waline
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: ${WALINE_DB_NAME}
      MYSQL_USER: ${WALINE_DB_USER}
      MYSQL_PASSWORD: ${WALINE_DB_PASSWORD}
      MYSQL_PREFIX: wl_
      MYSQL_CHARSET: utf8mb4
      JWT_TOKEN: ${WALINE_JWT_TOKEN}
      SITE_NAME: ${SITE_NAME}
      SITE_URL: https://${DOMAIN}
      SERVER_URL: https://${DOMAIN}/waline
      SECURE_DOMAINS: ${DOMAIN},www.${DOMAIN},lycanclaw.netlify.app
      LOGIN: enable
      COMMENT_AUDIT: ${WALINE_COMMENT_AUDIT}
      IPQPS: 60
      OAUTH_URL: ${WALINE_OAUTH_URL}
      SMTP_HOST: ${WALINE_SMTP_HOST}
      SMTP_SERVICE: ${WALINE_SMTP_SERVICE}
      SMTP_PORT: ${WALINE_SMTP_PORT}
      SMTP_SECURE: ${WALINE_SMTP_SECURE}
      SMTP_USER: ${WALINE_SMTP_USER}
      SMTP_PASS: ${WALINE_SMTP_PASS}
      AUTHOR_EMAIL: ${WALINE_AUTHOR_EMAIL}
      SENDER_NAME: ${WALINE_SENDER_NAME}
      SENDER_EMAIL: ${WALINE_SENDER_EMAIL}
      MAIL_SUBJECT: ${WALINE_MAIL_SUBJECT}
      MAIL_TEMPLATE: ${WALINE_MAIL_TEMPLATE}
      MAIL_SUBJECT_ADMIN: ${WALINE_MAIL_SUBJECT_ADMIN}
      MAIL_TEMPLATE_ADMIN: ${WALINE_MAIL_TEMPLATE_ADMIN}
    depends_on:
      mysql:
        condition: service_healthy
    logging: *default-logging
    networks:
      - lycan_net

  ncm-api:
    build:
      context: ../dev-services/music-upstream
      dockerfile: Dockerfile
    image: lycanclaw-music-upstream:4.32.0
    container_name: lycan-ncm-api
    restart: unless-stopped
    environment:
      PORT: 3000
    logging: *default-logging
    networks:
      - lycan_net

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    image: lycanclaw-backend:latest
    container_name: lycan-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SERVER_PORT: 8080
      LYCAN_CORS_ALLOWED_ORIGINS: https://${DOMAIN},https://www.${DOMAIN},https://lycanclaw.netlify.app
      LYCAN_SECURITY_ADMIN_TOKEN: ${BACKEND_ADMIN_TOKEN}
      LYCAN_SECURITY_ADMIN_QQ_WHITELIST: ${BACKEND_ADMIN_QQ_WHITELIST}
      LYCAN_SECURITY_TRUST_FORWARDED_HEADERS: "true"
      LYCAN_SECURITY_PUBLIC_WRITE_RATE_LIMIT_PER_MINUTE: 60
      LYCAN_DB_URL: jdbc:mysql://mysql:3306/${WALINE_DB_NAME}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      LYCAN_DB_USERNAME: ${WALINE_DB_USER}
      LYCAN_DB_PASSWORD: ${WALINE_DB_PASSWORD}
      LYCAN_CONTENT_POSTS_JSON_PATH: /data/content/posts.json
      LYCAN_CONTENT_KNOWLEDGE_STATS_JSON_PATH: /data/content/knowledge-stats.json
      LYCAN_ANALYTICS_EXCLUDED_VISITOR_NAMES: ${LYCAN_ANALYTICS_EXCLUDED_VISITOR_NAMES:-}
      LYCAN_ANALYTICS_EXCLUDED_WALINE_USER_IDS: ${LYCAN_ANALYTICS_EXCLUDED_WALINE_USER_IDS:-}
      LYCAN_IP2REGION_V4_XDB_PATH: ${LYCAN_IP2REGION_V4_XDB_PATH:-}
      LYCAN_IP2REGION_V6_XDB_PATH: ${LYCAN_IP2REGION_V6_XDB_PATH:-}
      LYCAN_MUSIC_UPSTREAM_BASE_URL: http://ncm-api:3000
      LYCAN_MUSIC_RANKING_OWNER_UID: "${MUSIC_RANKING_OWNER_UID:?MUSIC_RANKING_OWNER_UID is required}"
      LYCAN_MUSIC_PREFERRED_LEVEL: ${MUSIC_PREFERRED_LEVEL:-exhigh}
      LYCAN_RECOMMENDATION_MAX_CANDIDATE_POSTS: ${RECOMMENDATION_MAX_CANDIDATE_POSTS:-200}
      LYCAN_RECOMMENDATION_PAGEVIEW_WEIGHT: ${RECOMMENDATION_PAGEVIEW_WEIGHT:-1.0}
      LYCAN_RECOMMENDATION_COMMENT_WEIGHT: ${RECOMMENDATION_COMMENT_WEIGHT:-24.0}
      LYCAN_WALINE_BASE_URL: http://waline:8360
      LYCAN_WALINE_PUBLIC_URL: https://${DOMAIN}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRINGDOC_API_DOCS_ENABLED: "false"
      SPRINGDOC_SWAGGER_UI_ENABLED: "false"
      WALINE_SMTP_HOST: ${WALINE_SMTP_HOST}
      WALINE_SMTP_SERVICE: ${WALINE_SMTP_SERVICE}
      WALINE_SMTP_USER: ${WALINE_SMTP_USER}
      WALINE_SMTP_PASS: ${WALINE_SMTP_PASS}
      WALINE_AUTHOR_EMAIL: ${WALINE_AUTHOR_EMAIL}
    volumes:
      - ${CONTENT_DATA_HOST_PATH}:/data/content:ro
      - ./data/ip2region:/data/ip2region:ro
    depends_on:
      mysql:
        condition: service_healthy
      ncm-api:
        condition: service_started
      waline:
        condition: service_started
    logging: *default-logging
    networks:
      - lycan_net

volumes:
  mysql_data:
    name: lycanclaw_mysql_data

networks:
  lycan_net:
    driver: bridge
