server:
  # 后端服务端口
  port: 8080

spring:
  application:
    # 应用名称（日志与监控中展示）
    name: lycanclaw-backend
  datasource:
    # MySQL 连接地址（本地测试默认数据库：lycanclaw_local_test）
    url: ${LYCAN_DB_URL:jdbc:mysql://127.0.0.1:3306/lycanclaw_local_test?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    # 数据库用户名
    username: ${LYCAN_DB_USERNAME:root}
    # 数据库密码
    password: ${LYCAN_DB_PASSWORD:1677}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    # 本地默认自动更新表结构；生产建议改为 validate 并用 SQL 迁移
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        # 暴露 actuator 端点（当前仅健康检查和基础信息）
        include: health,info

springdoc:
  api-docs:
    # OpenAPI JSON 开关与路径
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    # Swagger UI 开关与路径
    enabled: true
    path: /swagger-ui.html
  # 文档默认返回类型
  default-produces-media-type: application/json

knife4j:
  # Knife4j 文档页开关（访问 /doc.html）
  enable: true
  setting:
    # 文档界面语言
    language: zh_cn

lycan:
  admin:
    # 管理端运行时配置文件（仅保存非敏感配置，可由后台页面在线修改）
    runtime-config-path: data/admin-runtime-config.json
  system:
    # 系统时间时区（管理端检查时间、配置更新时间等）
    zone-id: Asia/Shanghai
  cors:
    # 允许跨域来源，多个域名用英文逗号分隔
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173,https://wreckloud.com,https://www.wreckloud.com
  security:
    # 管理员令牌（必须改成你自己的随机值）
    admin-token: change-me-token
    # 管理员 QQ 身份白名单（逗号分隔，可填 QQ 号或 Waline QQ OAuth 标识）
    admin-qq-whitelist: 1677820334,UID_E59B5290860ADD10C36077980031A6FE
    # 是否要求 Waline 账号必须是 administrator 才能换取后端会话
    admin-require-waline-administrator: true
    # 后端管理会话有效期（秒）
    admin-session-ttl-seconds: 28800
    # 后端内存会话最大数量
    admin-session-max-size: 200
    # 管理接口限流（每分钟）
    auth-rate-limit-per-minute: 30
    # 公开音乐接口限流（每分钟）
    music-rate-limit-per-minute: 30
    # 会员登录 cookie 请求上游播放 URL 的全局限流（每分钟）
    music-login-url-global-limit-per-minute: 60
    # 管理接口访问日志开关（记录 IP / URI / method / 放行或拒绝）
    admin-auth-log-enabled: true
    # 公共 API 访问日志开关（记录访客 IP / URI / UA）
    public-access-log-enabled: true
    # 是否信任代理头（反向代理后可开启，按 X-Forwarded-For 识别真实 IP）
    trust-forwarded-headers: false
  analytics:
    # 博客仓库绝对路径（用于读取 git log）
    repo-path: D:/Portfolio/Website/LycanClaw
    # 统计时区
    zone-id: Asia/Shanghai
    # 默认统计天数
    days: 365
    # 统计目录，多个目录用英文逗号分隔
    scope: docs/thoughts,docs/knowledge
  music:
    # 首页随机流与关于页榜单固定账号 uid（与登录态解耦）
    playlist-owner-uid: 629126546
    # 默认目标音质（公开链路降级顺序：exhigh -> higher -> standard）
    preferred-level: exhigh
    upstream:
      # 上游网易云 API 服务地址（api-enhanced）
      base-url: http://127.0.0.1:3000
  recommendation:
    # 前端 posts.json 路径（用于读取文章元信息）
    posts-json-path: D:/Portfolio/Website/LycanClaw/docs/public/posts.json
    # 手动推荐配置文件（管理员接口写入）
    manual-config-path: data/recommendation-manual.json
    # 推荐聚合调度周期（毫秒，默认 5 分钟）
    aggregation-interval-millis: 300000
    # 单次聚合抓取 Waline 指标的并发数
    aggregation-fetch-parallelism: 6
    # 单篇文章聚合抓取超时时间（秒）
    aggregation-fetch-timeout-seconds: 15
    # 聚合快照保鲜窗口（秒）
    snapshot-fresh-seconds: 900
    # 启动后自动异步触发首轮聚合
    startup-warmup-enabled: true
    # 最大候选文章数
    max-candidate-posts: 200
    score:
      # 浏览量权重
      pageview-weight: 1.0
      # 评论数权重
      comment-weight: 24.0
  waline:
    # Waline 服务地址（用于评论/阅读统计聚合）
    base-url: http://127.0.0.1:8360
  tag:
    # 标签聚合读取的文章索引路径
    posts-json-path: D:/Portfolio/Website/LycanClaw/docs/public/posts.json
    # 标签数据缓存秒数
    cache-seconds: 300
