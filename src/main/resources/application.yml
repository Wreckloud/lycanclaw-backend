server:
  # 后端服务端口
  port: 8080
  # 读取 Nginx 转发的协议与主机信息，保证 Waline OAuth 回调地址正确
  forward-headers-strategy: framework

spring:
  application:
    # 应用名称（日志与监控中展示）
    name: lycanclaw-backend
  datasource:
    # MySQL 连接地址（本地测试默认数据库：lycanclaw_local_test）
    url: ${LYCAN_DB_URL:jdbc:mysql://127.0.0.1:3306/lycanclaw_local_test?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    # 数据库用户名
    username: ${LYCAN_DB_USERNAME:root}
    # 数据库密码（必须通过环境变量提供）
    password: ${LYCAN_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    # 表结构由 Flyway 管理，JPA 只校验实体映射
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Waline 会先在同一数据库创建 wl_ 表，因此从版本 0 建立基线后再执行 V1
    baseline-on-migrate: true
    baseline-version: 0

management:
  endpoints:
    web:
      exposure:
        # 暴露 actuator 端点（当前仅健康检查和基础信息）
        include: health,info

springdoc:
  api-docs:
    # OpenAPI JSON 开关与路径
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    # Swagger UI 开关与路径
    enabled: true
    path: /swagger-ui.html
  # 文档默认返回类型
  default-produces-media-type: application/json

lycan:
  system:
    # 系统时间时区（管理端检查时间、配置更新时间等）
    zone-id: Asia/Shanghai
  cors:
    # 允许跨域来源，多个域名用英文逗号分隔
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173,https://wreckloud.com,https://www.wreckloud.com,https://lycanclaw.netlify.app
  security:
    # 静态管理员令牌（可选，应急调试时通过环境变量提供）
    admin-token: ${LYCAN_SECURITY_ADMIN_TOKEN:}
    # 管理员 QQ 身份白名单（逗号分隔，可填 QQ 号或 Waline QQ OAuth 标识）
    admin-qq-whitelist: ${LYCAN_SECURITY_ADMIN_QQ_WHITELIST:}
    # 是否要求 Waline 账号必须是 administrator 才能换取后端会话
    admin-require-waline-administrator: true
    # 后端管理会话有效期（秒）
    admin-session-ttl-seconds: 28800
    # 后端内存会话最大数量
    admin-session-max-size: 200
    # 管理接口限流（每分钟）
    auth-rate-limit-per-minute: 30
    # 公开音乐接口限流（每分钟）
    music-rate-limit-per-minute: 30
    # 匿名写接口限流（每分钟）
    public-write-rate-limit-per-minute: 60
    # 公开评论提交限流（每分钟）
    comment-rate-limit-per-minute: ${LYCAN_SECURITY_COMMENT_RATE_LIMIT_PER_MINUTE:1}
    # 会员登录 cookie 请求上游播放 URL 的全局限流（每分钟）
    music-login-url-global-limit-per-minute: 60
    # 管理鉴权失败日志开关（记录 IP / URI / method / 拒绝原因）
    admin-auth-log-enabled: true
    # 是否信任代理头（反向代理后可开启，按 X-Forwarded-For 识别真实 IP）
    trust-forwarded-headers: false
  game:
    # 在线对战 WebSocket 单 IP 消息限流（每分钟）
    message-rate-limit-per-minute: ${LYCAN_GAME_MESSAGE_RATE_LIMIT_PER_MINUTE:120}
  analytics:
    exclude:
      # 后台统计排除的访客昵称，多个值用英文逗号分隔；用于过滤站长自己的访问
      visitor-names: ${LYCAN_ANALYTICS_EXCLUDED_VISITOR_NAMES:}
      # 后台统计排除的 Waline 用户 ID，默认复用管理员白名单
      waline-user-ids: ${LYCAN_ANALYTICS_EXCLUDED_WALINE_USER_IDS:${lycan.security.admin-qq-whitelist:}}
    ip-region:
      # ip2region IPv4 XDB 文件路径；留空时仅展示原始 IP
      v4-xdb-path: ${LYCAN_IP2REGION_V4_XDB_PATH:}
      # ip2region IPv6 XDB 文件路径；留空时不解析 IPv6 地区
      v6-xdb-path: ${LYCAN_IP2REGION_V6_XDB_PATH:}
  content:
    # 前端构建输出的内容索引，供标签、推荐、评论标题、后台分析和文章指标同步共用
    posts-json-path: ${LYCAN_CONTENT_POSTS_JSON_PATH:../frontend/docs/public/posts.json}
    knowledge-stats-json-path: ${LYCAN_CONTENT_KNOWLEDGE_STATS_JSON_PATH:../frontend/docs/public/knowledge-stats.json}
  music:
    # 首页随机流与关于页榜单固定账号 uid（与登录态解耦）
    ranking-owner-uid: ${LYCAN_MUSIC_RANKING_OWNER_UID:}
    # 默认目标音质（公开链路降级顺序：exhigh -> higher -> standard）
    preferred-level: ${LYCAN_MUSIC_PREFERRED_LEVEL:exhigh}
    upstream:
      # 上游网易云 API 服务地址（api-enhanced）
      base-url: ${LYCAN_MUSIC_UPSTREAM_BASE_URL:http://127.0.0.1:3000}
  recommendation:
    # 最大候选文章数
    max-candidate-posts: ${LYCAN_RECOMMENDATION_MAX_CANDIDATE_POSTS:200}
    score:
      # 浏览量权重
      pageview-weight: ${LYCAN_RECOMMENDATION_PAGEVIEW_WEIGHT:1.0}
      # 评论数权重
      comment-weight: ${LYCAN_RECOMMENDATION_COMMENT_WEIGHT:24.0}
  article-metrics:
    # 从 Waline 同步阅读量和评论量的周期
    sync-interval-millis: ${LYCAN_ARTICLE_METRICS_SYNC_INTERVAL_MILLIS:600000}
    # 同步 Waline 指标的并发数
    fetch-parallelism: ${LYCAN_ARTICLE_METRICS_FETCH_PARALLELISM:6}
    # 单篇文章指标请求超时秒数
    fetch-timeout-seconds: ${LYCAN_ARTICLE_METRICS_FETCH_TIMEOUT_SECONDS:15}
    # 启动后自动同步一次文章指标
    startup-sync-enabled: ${LYCAN_ARTICLE_METRICS_STARTUP_SYNC_ENABLED:true}
  waline:
    # Waline 服务地址（用于评论/阅读统计聚合）
    base-url: http://127.0.0.1:8360
    # 服务端访问 Waline 时携带的可信站点来源
    public-url: ${LYCAN_WALINE_PUBLIC_URL:http://localhost:5173}
    notification:
      # 以下配置只用于管理端展示通知状态，实际发送仍由 Waline 环境变量负责
      smtp-host: ${WALINE_SMTP_HOST:}
      smtp-service: ${WALINE_SMTP_SERVICE:}
      smtp-user: ${WALINE_SMTP_USER:}
      smtp-pass: ${WALINE_SMTP_PASS:}
      author-email: ${WALINE_AUTHOR_EMAIL:}
