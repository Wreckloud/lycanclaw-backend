<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>推荐管理（管理员）</title>
  <style>
    body { margin: 0; font-family: "Microsoft YaHei", sans-serif; background: #0b1020; color: #e5ecff; }
    .container { max-width: 1100px; margin: 24px auto; padding: 0 16px 32px; }
    .card { background: #121a2f; border: 1px solid #24314f; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    h1, h2 { margin: 0 0 12px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    button { border-radius: 8px; border: 1px solid #2f3d62; background: #0f172a; color: #e5ecff; padding: 8px 10px; }
    button { cursor: pointer; }
    button.primary { background: #2563eb; border-color: #2563eb; }
    button.ghost { background: transparent; }
    .columns { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    ul { list-style: none; margin: 0; padding: 0; }
    li { padding: 10px; border-bottom: 1px solid #273354; display: flex; justify-content: space-between; gap: 8px; }
    .meta { font-size: 12px; color: #95a4c8; margin-top: 6px; }
    .title { font-weight: 700; }
    .status { color: #3b82f6; margin-top: 8px; min-height: 20px; }
    .small { font-size: 12px; color: #95a4c8; }
    .nav { display: flex; gap: 12px; margin-bottom: 12px; font-size: 13px; flex-wrap: wrap; }
    .nav a { color: #7fb3ff; text-decoration: none; }
    @media (max-width: 900px) { .columns { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="container">
  <div class="nav">
    <a href="/admin/index.html">管理首页</a>
    <a href="/admin/music-login.html">音乐登录管理</a>
    <a href="/admin/recommendation-admin.html">推荐管理</a>
    <a href="/admin/ops-checks.html">运维检查项</a>
  </div>
  <h1>推荐管理（管理员）</h1>
  <div class="card">
    <div class="row">
      <div id="meInfo" class="small">管理员：加载中...</div>
    </div>
    <div class="row">
      <button onclick="logout()">退出登录</button>
      <button class="primary" onclick="loadAll()">加载数据</button>
      <button onclick="saveConfig()">保存手动推荐</button>
    </div>
    <div class="status" id="status"></div>
    <div class="small">手动推荐优先展示；顺序即首页展示优先级。</div>
  </div>

  <div class="columns">
    <div class="card">
      <h2>手动推荐顺序</h2>
      <ul id="manualList"></ul>
    </div>

    <div class="card">
      <h2>候选文章（按热门分）</h2>
      <ul id="candidateList"></ul>
    </div>
  </div>
</div>

<script src="/admin/admin-common.js"></script>
<script>
  const state = {
    manualUrls: [],
    candidates: []
  }

  function setStatus(text, isError = false) {
    const node = document.getElementById('status')
    node.textContent = text
    node.style.color = isError ? '#f87171' : '#3b82f6'
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;')
  }

  function renderMe(me) {
    const suffix = me?.qq ? `（QQ: ${escapeHtml(me.qq)}）` : ''
    document.getElementById('meInfo').innerHTML = `管理员：<strong>${escapeHtml(me?.nickname || '未知')}</strong>${suffix} / 模式：${escapeHtml(me?.mode || '-')}`
  }

  function encodeActionArg(value) {
    return encodeURIComponent(String(value ?? ''))
  }

  function decodeActionArg(value) {
    return decodeURIComponent(String(value ?? ''))
  }

  async function requestJson(url, options = {}) {
    return adminCommon.requestJson(url, options)
  }

  function addManual(url) {
    if (!state.manualUrls.includes(url)) {
      state.manualUrls.push(url)
      renderManual()
    }
  }

  function removeManual(url) {
    state.manualUrls = state.manualUrls.filter(item => item !== url)
    renderManual()
  }

  function moveManual(url, direction) {
    const index = state.manualUrls.indexOf(url)
    if (index < 0) return
    const next = index + direction
    if (next < 0 || next >= state.manualUrls.length) return
    const copy = [...state.manualUrls]
    ;[copy[index], copy[next]] = [copy[next], copy[index]]
    state.manualUrls = copy
    renderManual()
  }

  function addManualByEncoded(encodedUrl) {
    addManual(decodeActionArg(encodedUrl))
  }

  function removeManualByEncoded(encodedUrl) {
    removeManual(decodeActionArg(encodedUrl))
  }

  function moveManualByEncoded(encodedUrl, direction) {
    moveManual(decodeActionArg(encodedUrl), direction)
  }

  function renderManual() {
    const node = document.getElementById('manualList')
    if (!state.manualUrls.length) {
      node.innerHTML = '<li>暂无手动推荐</li>'
      return
    }

    node.innerHTML = state.manualUrls.map((url) => {
      const encodedUrl = encodeActionArg(url)
      const safeUrl = escapeHtml(url)
      return `
      <li>
        <span>${safeUrl}</span>
        <span>
          <button class="ghost" onclick="moveManualByEncoded('${encodedUrl}', -1)">↑</button>
          <button class="ghost" onclick="moveManualByEncoded('${encodedUrl}', 1)">↓</button>
          <button class="ghost" onclick="removeManualByEncoded('${encodedUrl}')">移除</button>
        </span>
      </li>
    `
    }).join('')
  }

  function renderCandidates() {
    const node = document.getElementById('candidateList')
    if (!state.candidates.length) {
      node.innerHTML = '<li>暂无候选数据</li>'
      return
    }

    node.innerHTML = state.candidates.map((item) => {
      const added = state.manualUrls.includes(item.url)
      const score = Number(item.hotScore || 0).toFixed(2)
      const encodedUrl = encodeActionArg(item.url)
      const safeTitle = escapeHtml(item.title)
      const safeUrl = escapeHtml(item.url)
      return `
        <li>
          <div>
            <div class="title">${safeTitle}</div>
            <div class="small">${safeUrl}</div>
            <div class="meta">浏览 ${item.pageviewCount || 0} / 评论 ${item.commentCount || 0} / 热门分 ${score}</div>
          </div>
          <div>
            <button ${added ? 'disabled' : ''} onclick="addManualByEncoded('${encodedUrl}')">${added ? '已加入' : '加入'}</button>
          </div>
        </li>
      `
    }).join('')
  }

  async function loadAll() {
    try {
      setStatus('正在加载...')
      const [config, candidates] = await Promise.all([
        requestJson('/api/recommendations/admin/config'),
        requestJson('/api/recommendations/admin/candidates?limit=200')
      ])
      state.manualUrls = Array.isArray(config.manualUrls) ? config.manualUrls : []
      state.candidates = Array.isArray(candidates) ? candidates : []
      renderManual()
      renderCandidates()
      setStatus('加载完成')
    } catch (error) {
      setStatus(error.message || String(error), true)
    }
  }

  async function saveConfig() {
    try {
      setStatus('正在保存...')
      const saved = await requestJson('/api/recommendations/admin/config', {
        method: 'PUT',
        body: JSON.stringify({ manualUrls: state.manualUrls })
      })
      state.manualUrls = Array.isArray(saved.manualUrls) ? saved.manualUrls : []
      renderManual()
      renderCandidates()
      setStatus('保存成功')
    } catch (error) {
      setStatus(error.message || String(error), true)
    }
  }

  async function logout() {
    try {
      await adminCommon.logout()
    } finally {
      location.href = '/admin/auth.html'
    }
  }

  ;(async () => {
    try {
      const me = await adminCommon.ensureAuthenticated(true)
      renderMe(me)
      await loadAll()
    } catch (_error) {
      // ensureAuthenticated 已跳转
    }
  })()
</script>
</body>
</html>
