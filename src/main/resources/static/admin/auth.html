<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理员登录</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #18181b;
      --panel: #1f2026;
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --accent: #19c56f;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(420px, 100%);
      background: var(--panel);
      padding: 22px;
    }
    h1 { margin: 0; font-size: 22px; line-height: 1.2; }
    .subtitle { margin: 10px 0 18px; color: var(--muted); font-size: 14px; }
    button {
      width: 100%;
      min-height: 42px;
      border: 0;
      background: var(--accent);
      color: #08130d;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled { opacity: .7; cursor: not-allowed; }
    .status { min-height: 22px; margin-top: 14px; color: var(--accent); white-space: pre-wrap; font-size: 13px; }
  </style>
</head>
<body>
  <section class="card">
    <h1>管理员入口</h1>
    <div class="subtitle">登录弹窗提供 QQ 和 GitHub；进入后台仍要求 Waline 管理员角色与 QQ 白名单。</div>
    <button id="loginBtn">使用 Waline 管理员身份登录</button>
    <div id="status" class="status">状态：待登录</div>
  </section>

  <script src="/admin/admin-common.js"></script>
  <script>
    const statusEl = document.getElementById('status');

    function setStatus(text, isError = false) {
      statusEl.textContent = `状态：${text}`;
      statusEl.style.color = isError ? 'var(--danger)' : 'var(--accent)';
    }

    async function tryAutoLogin() {
      const token = adminCommon.readToken();
      if (!token) return;
      try {
        await adminCommon.fetchMe();
        location.href = '/admin/index.html';
      } catch (_error) {
        adminCommon.clearToken();
      }
    }

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const button = document.getElementById('loginBtn');
      try {
        button.disabled = true;
        setStatus('正在打开 Waline 登录窗口...');
        const session = await adminCommon.loginWithWaline();
        setStatus(`登录成功，欢迎 ${session.nickname || '管理员'}，正在跳转...`);
        location.href = '/admin/index.html';
      } catch (error) {
        setStatus(error.message || String(error), true);
      } finally {
        button.disabled = false;
      }
    });

    tryAutoLogin();
  </script>
</body>
</html>
